# CCD calibration file
# for each spectrograph arm bx,rx,zx with x from 0 to 9
#  several versions of the hardware + firmware (not the version of this file or preproc. software)
#  identified by DATE-OBS-BEGIN,DATE-OBS-END with a compatibility check of CCDNAME,DOSVER,FEEVER
#
# For each amplifier X
# GAINX is in e/ADU
# SATURLEVX is in ADU : the saturation level above which pixels are masked (applied before multiplication by gain)
# CROSSTALKXY is the fraction of X in Y (in ADU/ADU, ie applied before multiplication by gain)
#
# The orientation of the amplifiers as seen with ds9
# **after** the ICS transfo for all cameras is by definition:
# C D
# A B
#
# The orientation of the amplifiers as seen with ds9
# **before** the ICS transfo depends on the camera.
# The transformations are given in DESI-1964
#
# BLUE CAMERA (before ICS transfo) :
# (complex tranfo, see etc/ics_transfo.py)
# A C
# B D
#
# RED CAMERA (before ICS transfo data[::-1,::-1])
# B A
# D C
#
# NIR CAMERA (before ICS transfo data[,::-1]) :
# D C
# B A
#
# PLEASE AVOID EDITING THIS FILE BY HAND AND USE INSTEAD THE SCRIPT desi_calib_config
#
# Note that comments with '#' below this header will not be saved when using desi_calib_config.
# Please use instead the keyword COMMENT: 'bla' in each config for a general comment
# and the format KEY:[VALUE , 'bla'] instead of KEY:VALUE to provide a comment for a specific entry.

